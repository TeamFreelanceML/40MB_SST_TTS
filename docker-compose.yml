services:
  # --- STT Backend ---
  backend:
    build:
      context: ./backend
    container_name: readaloud-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      STT_MODEL_NAME: ${STT_MODEL_NAME:-base}
      API_HOST: 0.0.0.0
      API_PORT: 8000
    volumes:
      - whisper_models:/root/.cache/whisper
    networks:
      - readaloud-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 15s
      start_period: 300s
      retries: 5

  # --- TTS Redis ---
  redis:
    image: redis:7-alpine
    container_name: readaloud-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - readaloud-net

  # --- TTS API ---
  tts-api:
    build:
      context: ./tts
    container_name: readaloud-tts-api
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - PORT=8001
    volumes:
      - tts_audio_cache:/app/audio_cache
      - tts_weights:/app/weights
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8001/health" ]
      interval: 30s
      timeout: 15s
      start_period: 300s
      retries: 5
    networks:
      - readaloud-net

  # --- TTS Admin Panel ---
  tts-admin:
    build:
      context: ./tts/admin-panel
    container_name: readaloud-tts-admin
    restart: unless-stopped
    ports:
      - "8002:3000"
    depends_on:
      tts-api:
        condition: service_healthy
    networks:
      - readaloud-net
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:3000/" ]
      interval: 30s
      timeout: 15s
      start_period: 60s
      retries: 5

  # --- Main Frontend ---
  frontend:
    build:
      context: ./frontend
    container_name: readaloud-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
      tts-api:
        condition: service_healthy
    environment:
      - BACKEND_URL=http://backend:8000
      - TTS_API_URL=http://tts-api:8001
    networks:
      - readaloud-net
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/" ]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 3

networks:
  readaloud-net:
    driver: bridge

volumes:
  whisper_models:
  redis_data:
  tts_audio_cache:
  tts_weights:
